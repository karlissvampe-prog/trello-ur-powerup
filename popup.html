<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rekvizīti</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 16px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] { flex: 1; padding: 9px 13px; border: 2px solid #dde3ea; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a2e; transition: border-color 0.2s; outline: none; }
    input[type="text"]:focus { border-color: #0052cc; }
    input[type="text"]::placeholder { color: #aaa; }
    button { padding: 9px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #btn-search { background: #0052cc; color: #fff; }
    #btn-search:hover { background: #0041a3; }
    #btn-search:disabled { background: #b0c4e8; cursor: not-allowed; }
    .action-row { display: flex; gap: 8px; margin-top: 12px; }
    .action-row button { flex: 1; padding: 11px; font-size: 13px; border-radius: 8px; display: none; }
    #btn-add  { background: #00875a; color: #fff; }
    #btn-add:hover  { background: #006644; }
    #btn-copy { background: #0052cc; color: #fff; }
    #btn-copy:hover { background: #0041a3; }
    #btn-add:disabled, #btn-copy:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-card { background: #fff; border: 1px solid #e0e6ed; border-radius: 10px; overflow: hidden; display: none; }
    .result-header { background: #0052cc; color: #fff; padding: 10px 14px; font-size: 13px; font-weight: 700; }
    .field-row { display: flex; align-items: flex-start; padding: 9px 14px; border-bottom: 1px solid #f0f3f6; gap: 10px; font-size: 13px; }
    .field-row:last-child { border-bottom: none; }
    .field-label { color: #6b7280; min-width: 110px; font-size: 12px; flex-shrink: 0; padding-top: 1px; }
    .field-value { color: #1a1a2e; font-weight: 500; word-break: break-word; }
    .field-value.missing { color: #9ca3af; font-style: italic; font-weight: 400; }
    #error-msg { display: none; background: #fff0f0; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #b91c1c; }
    #loading { display: none; text-align: center; padding: 20px; color: #6b7280; font-size: 13px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #0052cc; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #notice { display: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 10px; }
    #notice.success { background: #f0fdf4; border: 1px solid #6ee7b7; color: #065f46; }
    #notice.info    { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }
    #auto-hint { font-size: 11px; color: #6b7280; margin-bottom: 10px; display: none; }
    #auto-hint span { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
  </style>
</head>
<body>

<div id="auto-hint">🔍 Automātiski atrasts: <span id="hint-nr"></span></div>

<div class="search-row">
  <input type="text" id="reg-input" placeholder="Reģistrācijas numurs, piem. 44103130848" maxlength="20" />
  <button id="btn-search" onclick="searchCompany()">Meklēt</button>
</div>
<div id="loading"><span class="spinner"></span>Meklē uzņēmumu…</div>
<div id="error-msg"></div>

<div class="result-card" id="result-card">
  <div class="result-header">🏢 <span id="r-name"></span></div>
  <div class="result-body">
    <div class="field-row"><span class="field-label">📋 Reģ. nr.</span><span class="field-value" id="r-reg"></span></div>
    <div class="field-row"><span class="field-label">📍 Adrese</span><span class="field-value" id="r-addr"></span></div>
  </div>
</div>

<div class="action-row">
  <button id="btn-copy" onclick="copyToClipboard()">📋 Kopēt</button>
  <button id="btn-add"  onclick="addToCard()">➕ Pievienot komentārā</button>
</div>
<div id="notice"></div>

<script>
  var t = TrelloPowerUp.iframe();
  var currentData = null;
  var PROXY = 'https://trello-ur-pull.karlissvampe.workers.dev/';

  // Custom field nosaukums kartītē (precīzi kā Trello)
  var REG_FIELD_NAME = 'Reģistrācijas Nr.';

  document.getElementById('reg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchCompany();
  });

  // ── Ielādējoties — mēģina nolasīt reģ. nr. no custom field ──
  window.addEventListener('load', function() {
    t.card('customFieldItems').then(function(card) {
      var items = card.customFieldItems || [];
      t.board('customFields').then(function(board) {
        var fields = board.customFields || [];
        // Atrod lauku pēc nosaukuma
        var regField = fields.find(function(f) {
          return f.name === REG_FIELD_NAME;
        });
        if (!regField) return;
        // Atrod vērtību kartītē
        var item = items.find(function(i) {
          return i.idCustomField === regField.id;
        });
        if (!item || !item.value || !item.value.number) return;
        var nr = String(item.value.number);
        document.getElementById('reg-input').value = nr;
        document.getElementById('hint-nr').textContent = nr;
        document.getElementById('auto-hint').style.display = 'block';
        t.sizeTo(document.body);
        // Automātiski uzsāk meklēšanu
        searchCompany();
      });
    }).catch(function() {});
  });

  function show(id, d) { document.getElementById(id).style.display = d || 'block'; }
  function hide(id)    { document.getElementById(id).style.display = 'none'; }
  function setText(id, text, missing) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'field-value' + (missing ? ' missing' : '');
  }
  function showNotice(msg, type) {
    var el = document.getElementById('notice');
    el.textContent = msg;
    el.className = type;
    show('notice');
    t.sizeTo(document.body);
  }
  function buildText(info) {
    return '🏢 Uzņēmuma rekvizīti\n\nNosaukums: ' + info.name + '\nReģ. nr.: ' + info.reg + '\nAdrese: ' + info.addr;
  }

  async function searchCompany() {
    var regNr = document.getElementById('reg-input').value.trim();
    if (!regNr) return;
    hide('result-card'); hide('error-msg'); hide('notice');
    document.getElementById('btn-copy').style.display = 'none';
    document.getElementById('btn-add').style.display = 'none';
    show('loading');
    document.getElementById('btn-search').disabled = true;
    try {
      var resp = await fetch(PROXY + '?reg=' + encodeURIComponent(regNr));
      if (!resp.ok) throw new Error('Servera kļūda (' + resp.status + ').');
      var json = await resp.json();
      if (!json.success) throw new Error('API atbildes kļūda.');
      var records = json.result && json.result.records;
      if (!records || records.length === 0) throw new Error('Uzņēmums nav atrasts. Pārbaudi reģistrācijas numuru.');
      currentData = { name: records[0].name || '—', reg: String(records[0].regcode || '—'), addr: records[0].address || '—' };
      displayResult(currentData);
    } catch (err) {
      var msg = (err instanceof TypeError) ? 'Nevar savienoties ar proxy.' : err.message;
      document.getElementById('error-msg').textContent = '❌ ' + msg;
      show('error-msg');
    } finally {
      hide('loading');
      document.getElementById('btn-search').disabled = false;
    }
  }

  function displayResult(info) {
    document.getElementById('r-name').textContent = info.name;
    setText('r-reg',  info.reg,  info.reg  === '—');
    setText('r-addr', info.addr, info.addr === '—');
    show('result-card');
    show('btn-copy', 'flex');
    show('btn-add',  'flex');
    t.sizeTo(document.body);
  }

  function copyToClipboard() {
    if (!currentData) return;
    var text = buildText(currentData);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(function() { showNotice('✅ Nokopēts starpliktuvē!', 'success'); })
        .catch(function() { fallbackCopy(text); });
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try {
      document.execCommand('copy');
      showNotice('✅ Nokopēts starpliktuvē!', 'success');
    } catch(e) {
      showNotice('⚠️ Kopēšana neizdevās. Atlasi tekstu manuāli.', 'info');
    }
    document.body.removeChild(ta);
  }

  async function addToCard() {
    if (!currentData) return;
    document.getElementById('btn-add').disabled = true;
    var comment = buildText(currentData);
    try {
      var restApi = t.getRestApi();
      var token = await restApi.getToken({ scope: { write: true }, expiration: 'never' });
      var card = await t.card('id');
      var r = await fetch(
        'https://api.trello.com/1/cards/' + card.id + '/actions/comments?key=&token=' + token,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: comment }) }
      );
      if (!r.ok) throw new Error('HTTP ' + r.status);
      showNotice('✅ Rekvizīti pievienoti kartītei!', 'success');
      hide('btn-add');
    } catch(err) {
      showNotice('⚠️ Nevarēja pievienot komentāru. Izmanto "Kopēt".', 'info');
    } finally {
      document.getElementById('btn-add').disabled = false;
    }
  }
</script>
</body>
</html>
