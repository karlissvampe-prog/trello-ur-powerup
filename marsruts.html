<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maršruta Lapa</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 16px; }
    #loading { text-align: center; padding: 30px; color: #6b7280; font-size: 13px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #0052cc; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sheet { display: none; background: #fff; border: 1px solid #e0e6ed; border-radius: 12px; overflow: hidden; }
    .sheet-header { background: #0052cc; color: #fff; padding: 12px 16px; }
    .sheet-title { font-size: 15px; font-weight: 700; }
    .sheet-subtitle { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    .field-row { display: flex; align-items: flex-start; padding: 9px 16px; border-bottom: 1px solid #f0f3f6; gap: 10px; font-size: 13px; }
    .field-row:last-child { border-bottom: none; }
    .field-label { color: #6b7280; min-width: 130px; font-size: 12px; flex-shrink: 0; padding-top: 1px; }
    .field-value { color: #1a1a2e; font-weight: 600; word-break: break-word; }
    .field-value.missing { color: #9ca3af; font-weight: 400; font-style: italic; }
    .field-value.notes { font-weight: 400; white-space: pre-wrap; line-height: 1.5; }
    .divider { height: 4px; background: #f0f3f6; }
    #btn-copy { width: 100%; margin-top: 12px; padding: 12px; background: #0052cc; color: #fff; font-size: 14px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; }
    #btn-copy:hover { background: #0041a3; }
    #notice { display: none; margin-top: 10px; border-radius: 8px; padding: 10px 14px; font-size: 13px; text-align: center; background: #f0fdf4; border: 1px solid #6ee7b7; color: #065f46; }
  </style>
</head>
<body>

<div id="loading"><span class="spinner"></span>Ielādē datus…</div>

<div class="sheet" id="sheet">
  <div class="sheet-header">
    <div class="sheet-title">📄 Maršruta Lapa</div>
    <div class="sheet-subtitle" id="sheet-cardname"></div>
  </div>

  <div class="field-row">
    <span class="field-label">📅 Brauciena sākums</span>
    <span class="field-value" id="f-start"></span>
  </div>
  <div class="field-row">
    <span class="field-label">📍 Izbraukšana</span>
    <span class="field-value" id="f-from"></span>
  </div>
  <div class="field-row">
    <span class="field-label">🏁 Galamērķis</span>
    <span class="field-value" id="f-to"></span>
  </div>

  <div class="divider"></div>

  <div class="field-row">
    <span class="field-label">🚌 Autobuss</span>
    <span class="field-value" id="f-bus"></span>
  </div>
  <div class="field-row">
    <span class="field-label">👥 Pasažieri</span>
    <span class="field-value" id="f-pax"></span>
  </div>

  <div class="divider"></div>

  <div class="field-row">
    <span class="field-label">📞 Kontaktpersona</span>
    <span class="field-value" id="f-phone"></span>
  </div>
  <div class="field-row">
    <span class="field-label">🏢 Klients</span>
    <span class="field-value" id="f-client"></span>
  </div>

  <div class="divider"></div>

  <div class="field-row">
    <span class="field-label">ℹ️ Papildus info</span>
    <span class="field-value notes" id="f-notes"></span>
  </div>
</div>

<button id="btn-copy" style="display:none" onclick="copySheet()">📋 Kopēt maršruta lapu</button>
<div id="notice"></div>

<script>
  var t = TrelloPowerUp.iframe();
  var sheetText = '';

  var FIELD_MAP = {
    bus:    'Autobuss',
    pax:    'Pasažieru skaits',
    phone:  'Telefons',
    start:  'Brauciena sākums',
    client: 'Klients'
  };

  function show(id, d) { document.getElementById(id).style.display = d || 'block'; }
  function hide(id)    { document.getElementById(id).style.display = 'none'; }

  function setField(id, value, isNotes) {
    var el = document.getElementById(id);
    if (value) {
      el.textContent = value;
      el.className = 'field-value' + (isNotes ? ' notes' : '');
    } else {
      el.textContent = 'Nav norādīts';
      el.className = 'field-value missing';
    }
  }

  function parseDescription(desc) {
    var result = { from: '', to: '', notes: '' };
    if (!desc) return result;
    var lines = desc.split('\n');
    var notesLines = [];
    var noteMode = false;

    lines.forEach(function(line) {
      var l = line.trim();
      if (!l) return;

      if (/adrese\s*(sākums|s[aā]kums|izbraukšana|no)\s*:/i.test(l)) {
        result.from = l.replace(/^[^:]+:\s*/i, '').trim();
      } else if (/adrese\s*(beigas|galamērķis|uz)\s*:/i.test(l)) {
        result.to = l.replace(/^[^:]+:\s*/i, '').trim();
      } else if (/^izbraukšana\s*:/i.test(l)) {
        result.from = l.replace(/^[^:]+:\s*/i, '').trim();
      } else if (/papildus\s*(informācija|info)\s*:/i.test(l)) {
        var val = l.replace(/^[^:]+:\s*/i, '').trim();
        if (val) notesLines.push(val);
        noteMode = true;
      } else if (noteMode) {
        notesLines.push(l);
      }
    });

    result.notes = notesLines.join('\n').trim();
    return result;
  }

  function formatDate(val) {
    if (!val) return null;
    var d = new Date(val);
    if (isNaN(d)) return val;
    var dd   = String(d.getDate()).padStart(2,'0');
    var mm   = String(d.getMonth()+1).padStart(2,'0');
    var yyyy = d.getFullYear();
    var hh   = String(d.getHours()).padStart(2,'0');
    var min  = String(d.getMinutes()).padStart(2,'0');
    return dd + '.' + mm + '.' + yyyy + ' ' + hh + ':' + min;
  }

  window.addEventListener('load', async function() {
    try {
      var card  = await t.card('name', 'desc', 'customFieldItems', 'due');
      var board = await t.board('customFields');
      var fields = board.customFields || [];
      var items  = card.customFieldItems || [];

      var vals = {};
      fields.forEach(function(f) {
        var item = items.find(function(i) { return i.idCustomField === f.id; });
        if (!item) return;
        var v = item.value;
        if (!v) {
          if (item.idValue) {
            var opt = (f.options || []).find(function(o) { return o.id === item.idValue; });
            if (opt && opt.value && opt.value.text) vals[f.name] = opt.value.text;
          }
          return;
        }
        if (v.text     !== undefined) vals[f.name] = v.text;
        if (v.number   !== undefined) vals[f.name] = String(v.number);
        if (v.date     !== undefined) vals[f.name] = formatDate(v.date);
        if (v.checked  !== undefined) vals[f.name] = v.checked ? 'Jā' : 'Nē';
      });

      var addr = parseDescription(card.desc);

      document.getElementById('sheet-cardname').textContent = card.name;

      var startVal = vals[FIELD_MAP.start] || (card.due ? formatDate(card.due) : null);
      setField('f-start',  startVal);
      setField('f-from',   addr.from  || null);
      setField('f-to',     addr.to    || null);
      setField('f-bus',    vals[FIELD_MAP.bus]    || null);
      setField('f-pax',    vals[FIELD_MAP.pax]    || null);
      setField('f-phone',  vals[FIELD_MAP.phone]  || null);
      setField('f-client', vals[FIELD_MAP.client] || null);
      setField('f-notes',  addr.notes || null, true);

      sheetText =
        '📄 MARŠRUTA LAPA\n' +
        card.name + '\n' +
        '─────────────────────\n' +
        '📅 Brauciena sākums: ' + (startVal          || 'Nav norādīts') + '\n' +
        '📍 Izbraukšana: '      + (addr.from         || 'Nav norādīts') + '\n' +
        '🏁 Galamērķis: '       + (addr.to           || 'Nav norādīts') + '\n' +
        '─────────────────────\n' +
        '🚌 Autobuss: '         + (vals[FIELD_MAP.bus]    || 'Nav norādīts') + '\n' +
        '👥 Pasažieri: '        + (vals[FIELD_MAP.pax]    || 'Nav norādīts') + '\n' +
        '─────────────────────\n' +
        '📞 Kontaktpersona: '   + (vals[FIELD_MAP.phone]  || 'Nav norādīts') + '\n' +
        '🏢 Klients: '          + (vals[FIELD_MAP.client] || 'Nav norādīts') +
        (addr.notes ? '\n\nℹ️ Papildus informācija: ' + addr.notes : '');

      hide('loading');
      show('sheet');
      show('btn-copy', 'block');
      t.sizeTo(document.body);

    } catch(err) {
      document.getElementById('loading').textContent = '❌ Kļūda ielādējot datus.';
      console.error(err);
    }
  });

  function copySheet() {
    if (!sheetText) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(sheetText)
        .then(showNotice)
        .catch(fallback);
    } else { fallback(); }
  }

  function fallback() {
    var ta = document.createElement('textarea');
    ta.value = sheetText;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showNotice(); }
    catch(e) { alert('Kopēšana neizdevās.'); }
    document.body.removeChild(ta);
  }

  function showNotice() {
    document.getElementById('notice').textContent = '✅ Maršruta lapa nokopēta starpliktuvē!';
    show('notice');
    t.sizeTo(document.body);
  }
</script>
</body>
</html>
